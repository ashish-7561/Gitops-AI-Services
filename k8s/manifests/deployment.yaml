apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service-deployment
  labels:
    app: ai-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
      - name: ai-service
        # CRITICAL: Replace 'your_docker_username' below with your actual username!
        image: adhd1245/gitops-ai-service:latest
        ports:
        - containerPort: 3000