name: CI Pipeline - Build and Push Docker Image

# This tells GitHub to run this pipeline whenever you push to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code from the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Log in to DockerHub using the Secrets we just created
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3: Build the Docker image and push it to your account
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # REPLACE 'your_docker_username' below with your actual DockerHub username!
          tags: adhd1245/gitops-ai-service:latest