name: GitOps Build and Update Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Dynamically uses your GitHub secret
          tags: ${{ secrets.DOCKER_USERNAME }}/gitops-ai-service:${{ github.sha }}

      - name: Update Kubernetes Deployment File
        run: |
          # Uses regex to dynamically replace the old image path with the new one
          sed -i "s|image: .*/gitops-ai-service:.*|image: ${{ secrets.DOCKER_USERNAME }}/gitops-ai-service:${{ github.sha }}|g" k8s/manifests/deployment.yaml

      - name: Commit and Push the updated YAML
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          git add k8s/manifests/deployment.yaml
          
          git commit -m "chore: update image tag to ${{ github.sha }} [skip ci]"
          git push